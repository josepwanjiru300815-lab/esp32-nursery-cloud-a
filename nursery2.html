    <title>Nursery Bed 2</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: Arial, sans-serif; 
            background: #09100d; 
            color: #e2e8f0; 
            padding: 50px 20px; 
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 { color: #4ade80; font-size: 28px; margin-bottom: 20px; }
        p { color: #94a3b8; font-size: 16px; margin-bottom: 30px; }
        a { 
            background: #111e17; 
            border: 2px solid #1e3a2b; 
            color: #4ade80; 
            padding: 12px 24px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold;
            transition: 0.2s;
        }
        a:hover { background: #16a34a; color: white; }
    </style>
