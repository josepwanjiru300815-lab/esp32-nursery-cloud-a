<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Contact Team</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#090d16;color:#e2e8f0;padding:15px;min-height:100vh}
.header{display:flex;align-items:center;gap:10px;padding:10px 0;margin-bottom:20px;position:sticky;top:0;background:#090d16;z-index:10}
.back-btn{background:#1e293b;border:2px solid #10b981;color:#10b981;padding:8px 16px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:bold;transition:0.2s}
.back-btn:hover{background:#10b981;color:#090d16}
h1{flex:1;text-align:center;font-size:22px;margin:0;color:#10b981;letter-spacing:1px}
.content{background:#111827;border:2px solid #1f2937;border-radius:15px;padding:25px;margin-bottom:20px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.5);max-width:600px;margin:0 auto 20px}
.content h2{color:#38bdf8;font-size:20px;margin:0 0 20px 0;text-align:center}
.team-grid{display:flex;flex-direction:column;gap:15px}
.member-card{display:flex;align-items:center;gap:15px;background:#1f2937;padding:15px;border-radius:12px;border:1px solid #334155;width:100%;transition:0.2s}
.member-card:hover{border-color:#10b981;transform:translateX(4px)}
.member-img{width:60px;height:60px;border-radius:50%;border:2px solid #10b981;object-fit:cover;background:#111827;flex-shrink:0}
.member-info{flex:1;min-width:0}
.member-name{font-size:16px;font-weight:bold;color:#f3f4f6;margin-bottom:4px}
.member-role{font-size:13px;color:#10b981;font-weight:bold;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.member-phone{font-size:13px;color:#9ca3af;text-decoration:none;display:block;word-break:break-all}
.member-phone:hover{color:#38bdf8}
</style></head><body>
<div class="header">
  <a href="/" class="back-btn">← Home</a>
  <h1>Contacts Details</h1>
</div>
