<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Nursery Bed 1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:white;padding:6px;font-size:13px}
.header{display:flex;align-items:center;gap:8px;padding:4px 0;margin-bottom:6px}
.back-btn{background:#1e293b;border:2px solid #38bdf8;color:#38bdf8;padding:4px 12px;border-radius:6px;text-decoration:none;font-size:12px;font-weight:bold}
h1{flex:1;text-align:center;font-size:17px;margin:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.card{background:#1e293b;border-radius:8px;padding:8px}
.card h2{text-align:center;margin:0 0 4px 0;font-size:12px;color:#94a3b8}
.value{font-size:19px;text-align:center;font-weight:bold;margin:2px 0}
.sub{text-align:center;font-size:10px;color:#94a3b8;margin-top:2px}
a{text-decoration:none;display:inline-block;width:48%}
button{padding:6px 4px;margin:2px 0;border:none;border-radius:5px;font-size:11px;cursor:pointer;width:100%;display:block}
.on{background:#16a34a;color:white}.off{background:#dc2626;color:white}.stop{background:#f59e0b;color:white}
a.fullwidth{width:98%;margin-top:2px}
.btn-group{display:flex;justify-content:space-between;gap:4px}
.fullwidth{grid-column:1/span 2}
.badge{display:inline-block;padding:2px 8px;border-radius:15px;font-weight:bold;font-size:11px}
.badge-on{background:#16a34a}.badge-off{background:#dc2626}.badge-opening{background:#f59e0b;color:#000}
.badge-closing{background:#f59e0b;color:#000}.badge-opened{background:#16a34a}.badge-closed{background:#dc2626}
.badge-stopped{background:#475569}
.tank-section{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:6px}
.tank-wrapper{position:relative;width:65px;height:110px;border:2px solid #475569;border-top:none;border-radius:0 0 8px 8px;overflow:hidden;background:#0f172a}
.water{position:absolute;bottom:0;width:100%;background:linear-gradient(180deg,#4fc3f7 0%,#1d4ed8 100%);transition:height.6s}
.tank-grid{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.grid-line{width:100%;border-top:1px dashed rgba(255,255,255,0.2)}.grid-line.boundary{border-top:none}
.labels-column{display:flex;flex-direction:column;justify-content:space-between;height:110px;font-size:9px;font-weight:bold;color:#94a3b8}
.volume-display{margin-top:5px;background:#0f172a;padding:5px;border-radius:6px;border:1px solid #334155;text-align:center}
.volume-label{font-size:9px;color:#64748b}.volume-value{font-size:17px;font-weight:bold;color:#38bdf8}
.bar-bg{background:#334155;border-radius:6px;height:10px;margin:3px 0;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width.5s;background:linear-gradient(90deg,#f59e0b,#16a34a)}
.fault-overlay{background:#7f1d1d;border:2px solid #dc2626;border-radius:6px;padding:6px;text-align:center;color:#fca5a5;font-weight:bold;font-size:11px;display:none;margin-top:3px}
</style>
<script>
function badgeClass(val){const map={'ON':'badge-on','OFF':'badge-off','OPENING':'badge-opening','CLOSING':'badge-closing','OPENED':'badge-opened','CLOSED':'badge-closed','STOPPED':'badge-stopped','STOP':'badge-stopped'};return 'badge '+(map[val]||'badge-stopped')}
function updateSoilCard(valId,barId,statusId,overlayId,percent,isFault){
const v=document.getElementById(valId),b=document.getElementById(barId),s=document.getElementById(statusId),o=document.getElementById(overlayId);
if(isFault){v.innerText='---';b.style.width='100%';b.style.background='#dc2626';s.innerText='';o.style.display='block'}
else{v.innerText=percent.toFixed(0)+'%';b.style.width=percent+'%';b.style.background='';o.style.display='none';s.innerText=percent<40?'DRY':'MOIST';s.style.color=percent<40?'#f87171':'#4ade80'}}
function updateStatus(){fetch('/status').then(r=>r.json()).then(d=>{
const ps=document.getElementById('pumpStatus');ps.innerText=d.pump;ps.className=badgeClass(d.pump);
const vs=document.getElementById('valveStatus');vs.innerText=d.valve;vs.className=badgeClass(d.valve);
document.getElementById('water').style.height=d.percent+'%';
document.getElementById('volume').innerText=d.volume+' L';
document.getElementById('temp').innerText=d.temp.toFixed(1)+'°C';
document.getElementById('hum').innerText=d.hum.toFixed(1)+'%';
document.getElementById('humStatus').innerText=d.hum<40?'LOW':'OK';
document.getElementById('tempStatus').innerText=d.temp>35?'HOT':d.temp<15?'COLD':'OK';
updateSoilCard('soilVal1','soilBar1','soilStatus1','soilFault1',d.soil1,d.fault1);
updateSoilCard('soilVal2','soilBar2','soilStatus2','soilFault2',d.soil2,d.fault2)})}
setInterval(updateStatus,1500);window.onload=updateStatus;
</script></head><body>
<div class="header">
  <a href="/beds" class="back-btn">← Beds</a>
  <h1>NURSERY BED 1</h1>
</div>
<div class="grid">
<div class="card"><h2>PUMP</h2>
<div class="value"><span id="pumpStatus" class="badge badge-off">OFF</span></div>
<div class="btn-group"><a href="/pump/on"><button class="on">ON</button></a><a href="/pump/off"><button class="off">OFF</button></a></div></div>

<div class="card"><h2>VALVE</h2>
<div class="value"><span id="valveStatus" class="badge badge-stopped">STOPPED</span></div>
<div class="btn-group"><a href="/valve/open"><button class="on">OPEN</button></a><a href="/valve/close"><button class="off">CLOSE</button></a></div>
<div class="btn-group"><a href="/valve/stop" class="fullwidth"><button class="stop">STOP</button></a></div></div>

<div class="card"><h2>TEMP</h2><div class="value" id="temp">--°C</div><p class="sub" id="tempStatus">--</p></div>
<div class="card"><h2>HUMIDITY</h2><div class="value" id="hum">--%</div><p class="sub" id="humStatus">--</p></div>

<div class="card"><h2>SOIL 1</h2>
<div class="value" id="soilVal1">--%</div>
<div class="bar-bg"><div class="bar-fill" id="soilBar1" style="width:0%"></div></div>
<p class="sub" id="soilStatus1"></p>
<div class="fault-overlay" id="soilFault1">⚠ FAULT</div></div>

<div class="card"><h2>SOIL 2</h2>
<div class="value" id="soilVal2">--%</div>
<div class="bar-bg"><div class="bar-fill" id="soilBar2" style="width:0%"></div></div>
<p class="sub" id="soilStatus2"></p>
<div class="fault-overlay" id="soilFault2">⚠ FAULT</div></div>

<div class="card fullwidth"><h2>WATER TANK</h2>
<div class="tank-section">
<div class="tank-wrapper"><div class="water" id="water" style="height:0%"></div>
<div class="tank-grid"><div class="grid-line boundary"></div><div class="grid-line"></div><div class="grid-line"></div><div class="grid-line"></div><div class="grid-line boundary"></div></div></div>
<div class="labels-column"><div>FULL</div><div>3/4</div><div>1/2</div><div>1/4</div><div>EMPTY</div></div></div>
<div class="volume-display"><div class="volume-label">VOLUME</div><div class="volume-value" id="volume">-- L</div></div></div>
</div></body></html>
