<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Admin Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090d16;color:#e2e8f0;font-family:Arial;padding:20px;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;position:sticky;top:0;background:#090d16;padding:10px 0;z-index:10}
h1{color:#10b981;margin:0;font-size:24px;letter-spacing:1px}
.logout-btn{background:#1e293b;border:2px solid #ef4444;color:#ef4444;padding:8px 16px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:bold;transition:0.2s}
.logout-btn:hover{background:#ef4444;color:#090d16}
.container{max-width:800px;margin:0 auto}
form{background:#111827;padding:15px;border-radius:8px;border:1px solid #1f2937;margin-bottom:15px}
form h3{color:#38bdf8;font-size:16px;margin:0 0 12px 0}
.input-row{display:flex;gap:10px;flex-wrap:wrap}
input{flex:1;min-width:200px;padding:10px;background:#050a08;border:1px solid #1e3a2b;color:#e2e8f0;border-radius:4px;font-size:14px}
input:focus{outline:none;border-color:#10b981}
button{padding:10px 20px;background:#16a34a;border:none;color:white;border-radius:4px;cursor:pointer;font-weight:bold;font-size:14px;transition:0.2s}
button:hover{background:#4ade80}
button.danger{background:#dc2626}
button.danger:hover{background:#ef4444}
button.secondary{background:#1e293b;border:1px solid #38bdf8;color:#38bdf8}
button.secondary:hover{background:#38bdf8;color:#090d16}
.log-section{margin-top:20px}
.log-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.log-section h2{color:#38bdf8;font-size:18px;margin:0}
.log-controls{display:flex;gap:8px}
.log{background:#111827;padding:15px;border:1px solid #1f2937;border-radius:8px;font-family:monospace;font-size:12px;max-height:400px;overflow-y:auto;line-height:1.6}
.log-entry{margin-bottom:4px;color:#9ca3af}
.log-entry.error{color:#ef4444}
.log-entry.success{color:#4ade80}
.log-entry.warning{color:#f59e0b}
.log-entry.info{color:#38bdf8}
.badge-esp32{color:#10b981;font-weight:bold}
.badge-web{color:#38bdf8;font-weight:bold}
</style></head><body>
<div class="container">
  <div class="header">
    <h1>ADMIN PANEL</h1>
    <a href="/logout" class="logout-btn">Logout</a>
  </div>

  <form method="POST" action="/admin/change_pass">
    <h3>Change User Password</h3>
    <div class="input-row">
      <input name="new_password" type="password" placeholder="New user password" required>
      <button type="submit">Update Password</button>
    </div>
  </form>

  <form method="POST" action="/admin/kick_users">
    <h3>Session Management</h3>
    <button type="submit" class="danger">Kick All Users</button>
  </form>

  <div class="log-section">
    <div class="log-header">
      <h2>Security Log</h2>
      <div class="log-controls">
        <button id="pauseBtn" class="secondary" onclick="togglePause()">Pause</button>
        <button class="secondary" onclick="loadLogs()">Refresh</button>
      </div>
    </div>
    <div class="log" id="logContainer">
      <div class="log-entry">Loading logs...</div>
    </div>
  </div>
</div>

<script>
let isPaused = false;
let refreshInterval;

function togglePause() {
  isPaused =!isPaused;
  document.getElementById('pauseBtn').innerText = isPaused? 'Resume' : 'Pause';
  if (isPaused) {
    clearInterval(refreshInterval);
  } else {
    startRefresh();
  }
}

function startRefresh() {
  refreshInterval = setInterval(loadLogs, 3000);
}

async function loadLogs() {
  if (isPaused) return;

  try {
    const container = document.getElementById('logContainer');
    // Check if user was at bottom before update
    const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 5;

    const res = await fetch('/api/logs');
    if (!res.ok) throw new Error('Failed to fetch');
    const data = await res.json();

    if (data.length) {
      container.innerHTML = data.map(log => {
        // ADDED: Source badge based on msg content
        let badge = '';
        if (log.msg.includes('ESP32')) {
          badge = '<span class="badge-esp32">[ESP32]</span> ';
        } else if (log.msg.includes('Vercel')) {
          badge = '<span class="badge-web">[WEB]</span> ';
        } else {
          badge = '<span class="badge-web">[WEB]</span> ';
        }

        return `<div class="log-entry ${log.level}">
          [${log.time}] ${badge}${log.msg} (IP: ${log.ip})
        </div>`
      }).join('');

      // Only auto-scroll if user was already at bottom
      if (wasAtBottom) {
        container.scrollTop = container.scrollHeight;
      }
    } else {
      container.innerHTML = '<div class="log-entry">No security logs recorded yet.</div>';
    }
  } catch(e) {
    document.getElementById('logContainer').innerHTML =
      `<div class="log-entry error">Error loading logs: ${e.message}</div>`;
  }
}

// Hover to pause auto-refresh
const logContainer = document.getElementById('logContainer');
logContainer.addEventListener('mouseenter', () => {
  if (!isPaused) clearInterval(refreshInterval);
});
logContainer.addEventListener('mouseleave', () => {
  if (!isPaused) startRefresh();
});

loadLogs();
startRefresh();
</script>
</body></html>
